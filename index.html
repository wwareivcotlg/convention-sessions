<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>COTLG National Convention 2025 — Session Schedule</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --purple:#3C3489;
    --purple-light:#EEEDFE;
    --purple-mid:#534AB7;
    --purple-dark:#26215C;
    --gold:#B87A00;
    --gold-light:#FAEEDA;
    --gold-mid:#FAC775;
    --gold-dark:#633806;
    --text-primary:#1a1a1a;
    --text-secondary:#6b6b6b;
    --text-tertiary:#a0a0a0;
    --bg-primary:#ffffff;
    --bg-secondary:#f6f6f4;
    --border-light:rgba(0,0,0,0.10);
    --border-medium:rgba(0,0,0,0.18);
    --radius-md:8px;
    --radius-lg:12px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --text-primary:#f0f0f0;
      --text-secondary:#aaaaaa;
      --text-tertiary:#6e6e6e;
      --bg-primary:#1e1e1e;
      --bg-secondary:#2a2a2a;
      --border-light:rgba(255,255,255,0.10);
      --border-medium:rgba(255,255,255,0.18);
      --purple-light:#2a2560;
      --gold-light:#3a2800;
      --gold-dark:#FAC775;
    }
  }
  html,body{font-family:var(--font);background:var(--bg-secondary);color:var(--text-primary);min-height:100vh}
  .wrap{max-width:480px;margin:0 auto;background:var(--bg-secondary);min-height:100vh}

  /* Header */
  .app-header{background:var(--purple-dark);padding:1.5rem 1.25rem 1.25rem;text-align:center}
  .header-badge{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.10);border-radius:99px;padding:4px 14px;margin-bottom:.65rem}
  .header-badge span{font-size:11px;font-weight:500;color:#AFA9EC;letter-spacing:.5px;text-transform:uppercase}
  .app-header h1{color:#FAC775;font-size:20px;font-weight:600;letter-spacing:.2px;line-height:1.2}
  .app-header p{color:#AFA9EC;font-size:13px;margin-top:4px}

  /* Day tabs */
  .date-tabs{display:flex;background:var(--bg-primary);border-bottom:0.5px solid var(--border-light);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .date-tabs::-webkit-scrollbar{display:none}
  .date-tab{flex:1;padding:.7rem .5rem;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);border-bottom:2.5px solid transparent;white-space:nowrap;min-width:80px;transition:color .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
  .date-tab.active{color:var(--purple);border-bottom-color:var(--purple)}
  @media(prefers-color-scheme:dark){.date-tab.active{color:#AFA9EC;border-bottom-color:#AFA9EC}}

  /* Filter bar */
  .filter-bar{display:flex;gap:8px;padding:.75rem 1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg-primary);border-bottom:0.5px solid var(--border-light)}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-pill{padding:5px 13px;border-radius:99px;border:0.5px solid var(--border-medium);font-size:12px;cursor:pointer;white-space:nowrap;background:var(--bg-primary);color:var(--text-secondary);transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
  .filter-pill.active{background:var(--gold-light);border-color:var(--gold);color:var(--gold-dark);font-weight:500}

  /* Day panels */
  .day-panel{display:none;padding-bottom:2rem}
  .day-panel.active{display:block}

  /* Time groups */
  .time-group{padding:.85rem 1rem .35rem}
  .time-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.7px;margin-bottom:.6rem;display:flex;align-items:center;gap:6px}
  .time-label i{font-size:13px}
  .time-label::after{content:'';flex:1;height:0.5px;background:var(--border-light)}

  /* Session cards */
  .session-card{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);margin-bottom:.65rem;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
  .session-card:active{opacity:.92}
  .session-card.expanded{border-color:rgba(83,74,183,0.4);box-shadow:0 0 0 2px rgba(83,74,183,0.08)}
  .card-top{padding:.9rem 1rem .8rem;display:flex;gap:10px;align-items:flex-start}
  .card-track{width:4px;min-width:4px;border-radius:2px;align-self:stretch;margin-top:2px;flex-shrink:0}
  .card-body{flex:1;min-width:0}
  .card-title{font-size:14px;font-weight:500;color:var(--text-primary);line-height:1.35;margin-bottom:5px}
  .card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .card-time-chip{font-size:12px;color:var(--text-secondary);display:inline-flex;align-items:center;gap:3px}
  .card-time-chip i{font-size:12px}
  .badge{font-size:11px;padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px}
  .badge i{font-size:11px}
  .badge-room{background:var(--purple-light);color:var(--purple-mid)}
  .badge-type{background:var(--bg-secondary);color:var(--text-secondary);border:0.5px solid var(--border-light)}
  .card-chevron{font-size:18px;color:var(--text-tertiary);transition:transform .22s;flex-shrink:0;margin-top:1px}
  .session-card.expanded .card-chevron{transform:rotate(180deg)}

  /* Expanded details */
  .card-details{display:none;padding:0 1rem 1rem;border-top:0.5px solid var(--border-light)}
  .session-card.expanded .card-details{display:block;padding-top:.85rem}
  .detail-desc{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:.85rem}
  .speakers-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-tertiary);margin-bottom:.4rem}
  .speaker-chips{display:flex;flex-wrap:wrap;gap:6px}
  .speaker-chip{display:inline-flex;align-items:center;gap:6px;background:var(--gold-light);border-radius:99px;padding:4px 10px 4px 4px}
  .speaker-avatar{width:24px;height:24px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#CECBF6;flex-shrink:0;letter-spacing:.3px}
  .speaker-name{font-size:12px;color:var(--gold-dark);font-weight:400}

  /* Keynote flag */
  .keynote-flag{display:inline-flex;align-items:center;gap:4px;background:var(--purple-dark);color:#FAC775;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;margin-bottom:6px;letter-spacing:.3px}
  .keynote-flag i{font-size:11px}

  /* Empty state */
  .empty-msg{text-align:center;padding:3rem 1rem;color:var(--text-secondary);font-size:13px}
  .empty-msg i{font-size:28px;display:block;margin-bottom:.6rem;color:var(--text-tertiary)}

  /* Legend */
  .legend{display:flex;flex-wrap:wrap;gap:8px;padding:.75rem 1rem;background:var(--bg-primary);border-top:0.5px solid var(--border-light);margin-top:.5rem}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary)}
  .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<div class="wrap">
  <div class="app-header">
    <div class="header-badge"><span>Session Schedule</span></div>
    <h1>National Convention 2025</h1>
    <p>Church of the Living God &middot; C.W.F.F.</p>
  </div>

  <div class="date-tabs">
    <div class="date-tab active" onclick="switchDay('wed')">Wed &middot; Jul 9</div>
    <div class="date-tab" onclick="switchDay('thu')">Thu &middot; Jul 10</div>
    <div class="date-tab" onclick="switchDay('fri')">Fri &middot; Jul 11</div>
    <div class="date-tab" onclick="switchDay('sat')">Sat &middot; Jul 12</div>
  </div>

  <div class="filter-bar">
    <div class="filter-pill active" onclick="setFilter('all',this)">All sessions</div>
    <div class="filter-pill" onclick="setFilter('worship',this)">Worship</div>
    <div class="filter-pill" onclick="setFilter('leadership',this)">Leadership</div>
    <div class="filter-pill" onclick="setFilter('youth',this)">Youth</div>
    <div class="filter-pill" onclick="setFilter('ministry',this)">Ministry</div>
    <div class="filter-pill" onclick="setFilter('tech',this)">Technology</div>
  </div>

  <div id="day-wed" class="day-panel active"></div>
  <div id="day-thu" class="day-panel"></div>
  <div id="day-fri" class="day-panel"></div>
  <div id="day-sat" class="day-panel"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div>Worship</div>
    <div class="legend-item"><div class="legend-dot" style="background:#B87A00"></div>Leadership</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div>Youth</div>
    <div class="legend-item"><div class="legend-dot" style="background:#993C1D"></div>Ministry</div>
    <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Technology</div>
    <div class="legend-item"><div class="legend-dot" style="background:#888780"></div>General</div>
  </div>
</div>

<script>
const TRACK_COLORS={worship:'#534AB7',leadership:'#B87A00',youth:'#0F6E56',ministry:'#993C1D',tech:'#185FA5',general:'#888780'};

/* ─────────────────────────────────────────────
   SESSION DATA
   To add a session: copy any session object and
   paste it into the correct day array. Update all
   fields and add/remove tags to control filter visibility.
   To remove a session: delete its object from the array.
   ───────────────────────────────────────────── */
const SESSIONS={
  wed:[
    {time:'9:00 AM',sessions:[
      {id:'w1',title:'Opening Worship & Praise Celebration',track:'worship',room:'Main Sanctuary',type:'Plenary',duration:'90 min',tags:['worship'],keynote:false,
       speaker:[{name:'Sis. Denise Morgan',init:'DM'},{name:'Bro. Calvin Price',init:'CP'}],
       desc:'A high-energy opening worship experience setting the tone for the entire convention. Join the combined mass choir and praise team as we usher in the presence of God together.'},
    ]},
    {time:'11:00 AM',sessions:[
      {id:'w2',title:'Presidential Address & Welcome',track:'leadership',room:'Main Sanctuary',type:'Plenary',duration:'60 min',tags:['leadership'],keynote:true,
       speaker:[{name:'Chief Overseer Williams',init:'CW'}],
       desc:'The Chief Overseer delivers the official welcome and presidential address, casting the vision for the coming year and celebrating the growth of the organization.'},
    ]},
    {time:'2:00 PM',sessions:[
      {id:'w3',title:"Women's Ministry Leadership Forum",track:'ministry',room:'Fellowship Hall A',type:'Workshop',duration:'75 min',tags:['ministry','leadership'],keynote:false,
       speaker:[{name:'Superintendent Adams',init:'SA'},{name:'Sis. Patricia Hall',init:'PH'}],
       desc:"An empowering forum designed for women in ministry leadership. Topics include succession planning, discipleship strategies, and building intergenerational connections within the church."},
      {id:'w4',title:'Youth & Young Adults: Faith in the Digital Age',track:'youth',room:'Youth Center',type:'Breakout',duration:'75 min',tags:['youth','tech'],keynote:false,
       speaker:[{name:'Elder James Burke',init:'JB'}],
       desc:'A candid conversation with young adults about maintaining faith, identity, and community in an increasingly digital world. Includes open Q&A and small group discussion.'},
    ]},
    {time:'4:30 PM',sessions:[
      {id:'w5',title:'Introduction to Church Technology Tools',track:'tech',room:'Room 204',type:'Workshop',duration:'60 min',tags:['tech'],keynote:false,
       speaker:[{name:'Director Willie Ware',init:'WW'}],
       desc:'An introductory session covering the technology tools and digital platforms being deployed nationally, including the new mobile app, M365 rollout, and the Living Connection Initiative.'},
    ]},
    {time:'7:00 PM',sessions:[
      {id:'w6',title:'Evening Worship Service',track:'worship',room:'Main Sanctuary',type:'Service',duration:'120 min',tags:['worship'],keynote:false,
       speaker:[{name:'Bishop Ronald Hayes',init:'RH'}],
       desc:'The first full evening worship service of convention, featuring the combined choir, praise dancers, and a message from Bishop Hayes.'},
    ]},
  ],
  thu:[
    {time:'8:00 AM',sessions:[
      {id:'t1',title:'Morning Devotional & Prayer',track:'worship',room:'Main Sanctuary',type:'Service',duration:'45 min',tags:['worship'],keynote:false,
       speaker:[{name:'Elder Mary Collins',init:'MC'}],
       desc:'Start the day in prayer and the Word. A focused devotional time for all convention attendees before morning sessions begin.'},
    ]},
    {time:'9:00 AM',sessions:[
      {id:'t2',title:'Pastoral Leadership in a Changing Culture',track:'leadership',room:'Conference Room B',type:'Seminar',duration:'90 min',tags:['leadership'],keynote:false,
       speaker:[{name:'Rev. Dr. Thomas Green',init:'TG'},{name:'Supt. Linda Owens',init:'LO'}],
       desc:'A deep dive into adaptive leadership strategies for pastors navigating shifting cultural dynamics. Explore research-backed frameworks and practical case studies from COTLG congregations.'},
      {id:'t3',title:"Children's Ministry Certification Track — Day 1",track:'ministry',room:'Room 101',type:'Workshop',duration:'90 min',tags:['ministry','youth'],keynote:false,
       speaker:[{name:'Sis. Angela Brown',init:'AB'}],
       desc:"The first of a two-day certification workshop for children's ministry leaders. Day 1 covers curriculum development, safety protocols, and age-appropriate teaching methods."},
    ]},
    {time:'11:30 AM',sessions:[
      {id:'t4',title:'Finance & Stewardship: Building Healthy Church Budgets',track:'leadership',room:'Fellowship Hall B',type:'Workshop',duration:'75 min',tags:['leadership'],keynote:false,
       speaker:[{name:'Treasurer Samuel Ford',init:'SF'}],
       desc:'Practical guidance on creating transparent, faith-aligned budgets. Topics include tithing health metrics, restricted fund management, and preparing for external audits.'},
    ]},
    {time:'2:00 PM',sessions:[
      {id:'t5',title:'Evangelism Strategies for Urban Communities',track:'ministry',room:'Fellowship Hall A',type:'Workshop',duration:'75 min',tags:['ministry'],keynote:false,
       speaker:[{name:'Rev. Victor Nash',init:'VN'},{name:'Sis. Tanya Willis',init:'TW'}],
       desc:'Explore proven outreach strategies tailored for urban ministry contexts. Session includes testimonials from pastors who have seen measurable growth through targeted community engagement.'},
      {id:'t6',title:'Worship Leader Intensive',track:'worship',room:'Music Suite',type:'Workshop',duration:'75 min',tags:['worship'],keynote:false,
       speaker:[{name:'Min. of Music Cheryl Simms',init:'CS'}],
       desc:'A hands-on workshop for worship leaders, musicians, and choir directors. Covers leading diverse worship styles, building set lists, and rehearsal best practices.'},
      {id:'t7',title:'Technology Security & Church Data Privacy',track:'tech',room:'Room 204',type:'Workshop',duration:'75 min',tags:['tech','leadership'],keynote:false,
       speaker:[{name:'Director Willie Ware',init:'WW'}],
       desc:'Understanding cybersecurity risks facing faith organizations. Session covers M365 security posture, protecting member data, and practical steps local churches can take immediately.'},
    ]},
    {time:'7:00 PM',sessions:[
      {id:'t8',title:'General Assembly Business Session',track:'general',room:'Main Sanctuary',type:'Plenary',duration:'120 min',tags:['leadership'],keynote:true,
       speaker:[{name:'Chief Overseer Williams',init:'CW'}],
       desc:'The official business session of the National Convention. Agenda items include bylaw amendments, national budget approval, and elections for vacant board positions.'},
    ]},
  ],
  fri:[
    {time:'8:00 AM',sessions:[
      {id:'f1',title:'Morning Devotional & Prayer',track:'worship',room:'Main Sanctuary',type:'Service',duration:'45 min',tags:['worship'],keynote:false,
       speaker:[{name:'Supt. Gary Preston',init:'GP'}],
       desc:'Morning prayer and devotion led by the superintendents fellowship.'},
    ]},
    {time:'9:00 AM',sessions:[
      {id:'f2',title:'Grant Writing for Faith Organizations',track:'leadership',room:'Conference Room B',type:'Workshop',duration:'90 min',tags:['leadership','tech'],keynote:false,
       speaker:[{name:'Director Willie Ware',init:'WW'},{name:'Sis. Renee Carter',init:'RC'}],
       desc:'An introduction to the Living Connection Initiative grant program and how local churches can participate. Covers the application process, eligibility criteria, and timeline for the $5.3M funding opportunity.'},
      {id:'f3',title:"Children's Ministry Certification — Day 2",track:'ministry',room:'Room 101',type:'Workshop',duration:'90 min',tags:['ministry','youth'],keynote:false,
       speaker:[{name:'Sis. Angela Brown',init:'AB'}],
       desc:"Continuation of the two-day certification. Day 2 focuses on engaging children with technology, hybrid Sunday school models, and creating inclusive environments."},
    ]},
    {time:'2:00 PM',sessions:[
      {id:'f4',title:'Healing & Wholeness: Mental Health in Ministry',track:'ministry',room:'Fellowship Hall A',type:'Seminar',duration:'90 min',tags:['ministry'],keynote:false,
       speaker:[{name:'Dr. Phyllis Chambers',init:'PC'},{name:'Pastor Andre Webb',init:'AW'}],
       desc:'A compassionate conversation on mental health, burnout prevention, and trauma-informed ministry. Designed for both ministers and lay leaders caring for their congregations.'},
      {id:'f5',title:'Young Ministers Fellowship',track:'youth',room:'Youth Center',type:'Breakout',duration:'90 min',tags:['youth','leadership'],keynote:false,
       speaker:[{name:'Rev. Isaiah Brooks',init:'IB'}],
       desc:'A dedicated space for ministers age 40 and under to connect, share challenges, and receive mentoring from senior leaders in the organization.'},
    ]},
    {time:'7:00 PM',sessions:[
      {id:'f6',title:'Consecration Night Service',track:'worship',room:'Main Sanctuary',type:'Service',duration:'150 min',tags:['worship'],keynote:true,
       speaker:[{name:'Bishop Ronald Hayes',init:'RH'},{name:'Chief Overseer Williams',init:'CW'}],
       desc:'A sacred consecration service focused on prayer, anointing, and commissioning. Participants are encouraged to come prepared for a time of deep spiritual renewal.'},
    ]},
  ],
  sat:[
    {time:'9:00 AM',sessions:[
      {id:'s1',title:'Ordination & Licensing Service',track:'worship',room:'Main Sanctuary',type:'Service',duration:'120 min',tags:['worship','ministry'],keynote:true,
       speaker:[{name:'Chief Overseer Williams',init:'CW'}],
       desc:'The annual ordination and licensing service recognizing new ministers, elders, and deacons across the national body.'},
    ]},
    {time:'11:30 AM',sessions:[
      {id:'s2',title:'State & District Reports',track:'leadership',room:'Main Sanctuary',type:'Plenary',duration:'90 min',tags:['leadership'],keynote:false,
       speaker:[{name:'Multiple District Superintendents',init:'DS'}],
       desc:'State and district superintendents deliver annual ministry reports highlighting growth, challenges, and testimonies from their regions.'},
    ]},
    {time:'2:00 PM',sessions:[
      {id:'s3',title:'National Technology Strategy Q&A',track:'tech',room:'Room 204',type:'Workshop',duration:'60 min',tags:['tech'],keynote:false,
       speaker:[{name:'Director Willie Ware',init:'WW'}],
       desc:'An open forum for pastors, administrators, and church leaders to ask questions about the national technology rollout, app features, and support resources available.'},
      {id:'s4',title:'Church Growth & Planting Panel',track:'ministry',room:'Fellowship Hall B',type:'Panel',duration:'75 min',tags:['ministry','leadership'],keynote:false,
       speaker:[{name:'Rev. Marcus Powell',init:'MP'},{name:'Supt. Linda Owens',init:'LO'},{name:'Rev. Dr. Thomas Green',init:'TG'}],
       desc:'Three leaders who have successfully planted or revitalized congregations share their journeys and take questions from the audience. A must-attend for those sensing a call to church planting.'},
    ]},
    {time:'7:00 PM',sessions:[
      {id:'s5',title:'Closing Night Celebration Service',track:'worship',room:'Main Sanctuary',type:'Service',duration:'180 min',tags:['worship'],keynote:true,
       speaker:[{name:'Chief Overseer Williams',init:'CW'},{name:'Bishop Ronald Hayes',init:'RH'}],
       desc:'The grand closing service of the National Convention. Featuring testimonies, musical celebration, a closing message, and sending forth of all delegates.'},
    ]},
  ]
};

/* ─── State ─── */
let activeDay='wed';
let activeFilter='all';

/* ─── Build a single day panel ─── */
function buildDay(dayKey){
  const container=document.getElementById('day-'+dayKey);
  container.innerHTML='';
  const groups=SESSIONS[dayKey];
  let anyVisible=false;
  groups.forEach(group=>{
    const visible=group.sessions.filter(s=>activeFilter==='all'||s.tags.includes(activeFilter));
    if(!visible.length)return;
    anyVisible=true;
    const grp=document.createElement('div');
    grp.className='time-group';
    grp.innerHTML=`<div class="time-label"><i class="ti ti-clock"></i>${group.time}</div>`;
    visible.forEach(s=>{
      const tc=TRACK_COLORS[s.track]||TRACK_COLORS.general;
      const chips=s.speaker.map(sp=>`<div class="speaker-chip"><div class="speaker-avatar">${sp.init}</div><span class="speaker-name">${sp.name}</span></div>`).join('');
      const card=document.createElement('div');
      card.className='session-card';
      card.id='card-'+s.id;
      card.setAttribute('role','button');
      card.setAttribute('aria-expanded','false');
      card.innerHTML=`
        <div class="card-top">
          <div class="card-track" style="background:${tc}"></div>
          <div class="card-body">
            ${s.keynote?'<div class="keynote-flag"><i class="ti ti-star"></i> Keynote</div>':''}
            <div class="card-title">${s.title}</div>
            <div class="card-meta">
              <span class="card-time-chip"><i class="ti ti-clock"></i>${s.duration}</span>
              <span class="badge badge-room"><i class="ti ti-map-pin"></i>${s.room}</span>
              <span class="badge badge-type">${s.type}</span>
            </div>
          </div>
          <i class="ti ti-chevron-down card-chevron"></i>
        </div>
        <div class="card-details">
          <p class="detail-desc">${s.desc}</p>
          <div class="speakers-label">Speakers</div>
          <div class="speaker-chips">${chips}</div>
        </div>`;
      card.addEventListener('click',()=>{
        const expanded=card.classList.toggle('expanded');
        card.setAttribute('aria-expanded',expanded);
      });
      grp.appendChild(card);
    });
    container.appendChild(grp);
  });
  if(!anyVisible){
    container.innerHTML='<div class="empty-msg"><i class="ti ti-calendar-off"></i>No sessions match this filter for this day.</div>';
  }
}

/* ─── Switch day tab ─── */
function switchDay(day){
  const days=['wed','thu','fri','sat'];
  document.querySelectorAll('.date-tab').forEach((t,i)=>t.classList.toggle('active',days[i]===day));
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('day-'+day).classList.add('active');
  activeDay=day;
  buildDay(day);
}

/* ─── Set filter pill ─── */
function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  ['wed','thu','fri','sat'].forEach(buildDay);
}

/* ─── Init ─── */
['wed','thu','fri','sat'].forEach(buildDay);
</script>
</body>
</html>
